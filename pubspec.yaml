name: chobo
description: CHOBO household accounting app.
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  intl: ^0.19.0
  file_picker: ^8.1.6
  pointycastle: ^3.9.1
  sqlite3: ^3.2.0
  package_info_plus: ^8.0.0
  fl_chart: ^0.69.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.8

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  uses-material-design: true
